<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - 2WAYS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="images/LOGO.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #1a1a1a;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        header a {
            color: inherit;
            text-decoration: none;
        }

        .thank-you-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .thank-you-content {
            text-align: center;
            max-width: 500px;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border: 3px solid #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 36px;
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 400;
            margin-bottom: 20px;
            font-style: italic;
        }

        .message {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .btn-continue {
            display: inline-block;
            background-color: #1a1a1a;
            color: white;
            padding: 16px 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-continue:hover {
            background-color: #333;
        }

        footer {
            background-color: #1a1a1a;
            color: #999;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><h1>2WAYS</h1></a>
    </header>

    <div class="thank-you-container">
        <div class="thank-you-content">
            <div class="checkmark">✓</div>
            <h2>Thank You!</h2>
            <p class="message">
                Your order has been confirmed.<br>
                You will receive an email confirmation shortly.<br><br>
                We can't wait for you to flip it and wear it again!
            </p>
            <a href="index.html" class="btn-continue">Continue Shopping</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 2WAYS. All rights reserved.</p>
    </footer>
</body>
</html>
